<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpiceBox Cloud Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);transition:background .3s,color .3s;min-height:100vh}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}

/* ===== CSS VARIABLES ===== */
:root{
  --primary:#FF6B35;--primary-dark:#e85a26;--primary-light:rgba(255,107,53,.12);
  --bg:#faf8f6;--bg2:#ffffff;--bg3:#f3f0ed;
  --fg:#1a1208;--fg2:#4a3f35;--muted:#8a7a6e;
  --border:#e8e0d8;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:14px;--radius-sm:8px;--radius-lg:20px;--t:.2s ease
}
.dark{
  --bg:#130f0a;--bg2:#1e1710;--bg3:#261e15;
  --fg:#f5ede5;--fg2:#c8b5a5;--muted:#9a8a7a;
  --border:#352a20;--shadow:0 2px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 32px rgba(0,0,0,.5)
}

/* ===== UTILS ===== */
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.hidden{display:none!important}
.text-primary{color:var(--primary)}
.text-muted{color:var(--muted)}
.fw-bold{font-weight:700}
.fw-black{font-weight:900}
.sm{font-size:.85rem}
.mt-2{margin-top:12px}
.mt-4{margin-top:24px}
.mb-2{margin-bottom:12px}
.flex{display:flex}
.flex-center{display:flex;align-items:center;justify-content:center}
.gap-2{gap:10px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;transition:var(--t);cursor:pointer;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--fg)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:transparent;color:var(--fg2)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-block{width:100%}
.btn-icon{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:var(--bg3);color:var(--fg);transition:var(--t);border:1px solid var(--border)}
.btn-icon:hover{background:var(--primary-light);color:var(--primary)}

/* ===== NAVBAR ===== */
.navbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.06)}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.logo{display:flex;align-items:center;gap:8px;font-weight:900;font-size:1.3rem;color:var(--fg);cursor:pointer}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1rem}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{padding:8px 16px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;color:var(--muted);transition:var(--t);cursor:pointer}
.nav-link:hover,.nav-link.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-actions{display:flex;align-items:center;gap:8px}
.cart-btn{position:relative}
.cart-badge{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--primary);color:#fff;border-radius:50%;font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.hamburger{display:none}
.mobile-nav{border-top:1px solid var(--border);display:flex;flex-direction:column;padding:8px 20px 12px}
.mobile-nav-link{padding:12px 16px;border-radius:var(--radius-sm);font-weight:500;color:var(--fg2);font-size:.95rem;transition:var(--t);cursor:pointer}
.mobile-nav-link:hover{background:var(--primary-light);color:var(--primary)}

/* ===== CART DRAWER ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200}
.cart-drawer{position:fixed;top:0;right:-420px;width:420px;max-width:100vw;height:100vh;background:var(--bg2);z-index:201;display:flex;flex-direction:column;transition:right .35s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
.cart-drawer.open{right:0}
.cart-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border)}
.cart-title{display:flex;align-items:center;gap:8px}
.cart-title h2{font-size:1.1rem;font-weight:700}
.cart-count{background:var(--primary);color:#fff;font-size:.75rem;font-weight:800;padding:2px 8px;border-radius:20px}
.cart-items{flex:1;overflow-y:auto;padding:16px}
.cart-empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:3rem;margin-bottom:16px}
.cart-item{display:flex;gap:12px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.cart-item img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:600;font-size:.9rem}
.cart-item-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.cart-item-price{color:var(--primary);font-weight:700;font-size:.9rem;margin-top:4px}
.qty-controls{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);font-size:1rem;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--t)}
.qty-btn.plus{border-color:var(--primary);color:var(--primary)}
.qty-btn:hover{background:var(--primary-light)}
.qty-num{font-weight:700;width:20px;text-align:center}
.cart-item-del{color:var(--muted);font-size:1rem;padding:4px;align-self:flex-start;cursor:pointer}
.cart-item-del:hover{color:#e74c3c}
.cart-footer{padding:16px 20px;border-top:1px solid var(--border)}
.price-row{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:8px}
.price-row.total{font-size:1rem;font-weight:800;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;animation:slideUp .3s ease}
@media(min-width:600px){.modal{border-radius:var(--radius-lg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--fg2);border:none}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg2);padding:12px 24px;border-radius:50px;font-size:.9rem;font-weight:600;z-index:400;box-shadow:var(--shadow-lg)}

/* ===== HERO ===== */
.hero{background:linear-gradient(135deg,#FF6B35 0%,#e85a26 50%,#c0392b 100%);color:#fff;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1600&auto=format&fit=crop') center/cover no-repeat;opacity:.18}
.hero-inner{position:relative;max-width:1200px;margin:0 auto;padding:80px 20px;display:flex;align-items:center;gap:40px;flex-wrap:wrap}
.hero-text{flex:1;min-width:280px}
.hero-badge{display:inline-block;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:20px;font-size:.82rem;font-weight:600;margin-bottom:20px}
.hero h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1.15;margin-bottom:16px}
.hero-yellow{color:#fde68a}
.hero-sub{font-size:1.05rem;opacity:.88;margin-bottom:28px;max-width:480px;line-height:1.6}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap}
.hero-btn-primary{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--primary);padding:14px 28px;border-radius:var(--radius);font-weight:800;font-size:.95rem;transition:var(--t);box-shadow:0 4px 16px rgba(0,0,0,.15);cursor:pointer}
.hero-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.hero-btn-secondary{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);color:#fff;padding:14px 28px;border-radius:var(--radius);font-weight:600;font-size:.95rem;border:1.5px solid rgba(255,255,255,.35);transition:var(--t);cursor:pointer}
.hero-btn-secondary:hover{background:rgba(255,255,255,.28)}
.hero-img-wrap{flex:1;min-width:240px;display:flex;justify-content:center}
.hero-img{width:300px;height:300px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.3);box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* ===== FEATURES ===== */
.features-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 0}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.feature-card{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.feature-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.feature-title{font-weight:700;font-size:.9rem}
.feature-sub{font-size:.78rem;color:var(--muted)}

/* ===== BANNER ===== */
.banner-section{padding:32px 0}
.banner-wrap{border-radius:var(--radius-lg);overflow:hidden;position:relative;height:180px}
.banner-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:32px 40px;opacity:0;transition:opacity .5s ease;border-radius:var(--radius-lg)}
.banner-slide.active{opacity:1}
.banner-slide-1{background:linear-gradient(135deg,#FF6B35,#e85a26)}
.banner-slide-2{background:linear-gradient(135deg,#f59e0b,#d97706)}
.banner-slide-3{background:linear-gradient(135deg,#e84393,#be185d)}
.banner-text{color:#fff}
.banner-title{font-size:2.2rem;font-weight:900}
.banner-sub{font-size:1rem;opacity:.9}
.banner-code{display:inline-block;background:rgba(255,255,255,.2);padding:5px 14px;border-radius:8px;font-size:.85rem;font-weight:700;margin-top:8px;letter-spacing:1px}
.banner-img{height:140px;border-radius:12px;object-fit:cover;opacity:.5}
.banner-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.banner-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.5);transition:all .3s;cursor:pointer}
.banner-dot.active{background:#fff;width:18px}
.banner-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:1rem;border:none;transition:var(--t);z-index:5}
.banner-arrow:hover{background:rgba(255,255,255,.4)}
.banner-prev{left:12px}
.banner-next{right:12px}

/* ===== SECTION ===== */
.section{padding:48px 0}
.section-muted{background:var(--bg3)}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px}
.section-title{font-size:1.5rem;font-weight:900}
.section-sub{font-size:.85rem;color:var(--muted);margin-top:4px}
.see-all{font-size:.85rem;font-weight:600;color:var(--primary);cursor:pointer}
.see-all:hover{text-decoration:underline}

/* ===== CATEGORIES ===== */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cat-card{position:relative;height:160px;border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform var(--t),box-shadow var(--t)}
.cat-card:hover{transform:scale(1.03);box-shadow:var(--shadow-lg)}
.cat-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cat-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%)}
.cat-info{position:absolute;bottom:14px;left:14px;color:#fff}
.cat-emoji{font-size:1.6rem}
.cat-name{font-weight:700;font-size:.9rem}

/* ===== ITEM CARD ===== */
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform var(--t),box-shadow var(--t)}
.item-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.item-img-wrap{position:relative}
.item-img{width:100%;height:190px;object-fit:cover}
.item-badge{position:absolute;top:10px;left:10px;background:var(--primary);color:#fff;font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:20px}
.veg-dot{position:absolute;top:10px;right:10px;width:22px;height:22px;background:#fff;border:2px solid #fff;border-radius:4px;display:flex;align-items:center;justify-content:center}
.veg-dot-inner{width:12px;height:12px;border-radius:50%}
.veg{background:#22c55e}
.nonveg{background:#ef4444}
.item-body{padding:14px}
.item-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.item-desc{font-size:.8rem;color:var(--muted);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-meta{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);margin-bottom:10px}
.item-footer{display:flex;align-items:center;justify-content:space-between}
.item-price{font-size:1.15rem;font-weight:900;color:var(--primary)}
.add-btn{display:flex;align-items:center;gap:4px;background:var(--primary);color:#fff;padding:7px 14px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:700;transition:var(--t);cursor:pointer;border:none}
.add-btn:hover{background:var(--primary-dark)}

/* ===== TESTIMONIALS ===== */
.testimonial-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.testimonial-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:transform var(--t)}
.testimonial-card:hover{transform:translateY(-4px)}
.stars{display:flex;gap:2px;margin-bottom:10px;font-size:.9rem;color:#f59e0b}
.testimonial-text{font-size:.88rem;color:var(--fg2);font-style:italic;margin-bottom:14px;line-height:1.5}
.testimonial-author{display:flex;align-items:center;gap:10px}
.author-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover}
.author-name{font-weight:700;font-size:.88rem}
.author-loc{font-size:.75rem;color:var(--muted)}

/* ===== FOOTER ===== */
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:48px 0 24px}
.footer-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr;gap:32px;margin-bottom:32px}
.footer-logo{display:flex;align-items:center;gap:8px;font-weight:900;font-size:1.1rem;margin-bottom:10px}
.footer-desc{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:14px}
.social-links{display:flex;gap:8px}
.social-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:var(--t);color:var(--muted);cursor:pointer}
.social-btn:hover{background:var(--primary-light);color:var(--primary)}
.footer-col h4{font-weight:700;margin-bottom:14px;font-size:.95rem}
.footer-links{display:flex;flex-direction:column;gap:8px}
.footer-links a{font-size:.85rem;color:var(--muted);transition:var(--t);cursor:pointer}
.footer-links a:hover{color:var(--primary)}
.footer-contact{display:flex;flex-direction:column;gap:10px}
.contact-item{display:flex;align-items:flex-start;gap:8px;font-size:.85rem;color:var(--muted)}
.contact-icon{color:var(--primary);font-size:.9rem;flex-shrink:0;margin-top:1px}
.footer-bottom{border-top:1px solid var(--border);padding-top:20px;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;color:var(--muted)}

/* ===== PAGE HEADER ===== */
.page-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:32px 0}
.page-header h1{font-size:2rem;font-weight:900}
.page-header p{color:var(--muted);margin-top:4px}

/* ===== MENU ===== */
.menu-layout{display:flex;gap:24px;padding:32px 0}
.filter-sidebar{width:230px;flex-shrink:0;position:sticky;top:88px;align-self:flex-start}
.filter-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.filter-title{font-weight:700}
.filter-clear{font-size:.8rem;color:var(--primary);font-weight:600;cursor:pointer}
.filter-group{margin-bottom:20px}
.filter-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.filter-option{display:block;width:100%;text-align:left;padding:8px 12px;border-radius:var(--radius-sm);font-size:.88rem;color:var(--fg2);transition:var(--t);cursor:pointer;border:none;background:none}
.filter-option:hover,.filter-option.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.filter-pref{display:flex;gap:8px}
.filter-pref-btn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:.82rem;font-weight:500;cursor:pointer;transition:var(--t);background:var(--bg);color:var(--fg2);display:flex;align-items:center;gap:5px;justify-content:center}
.filter-pref-btn.veg-active{border-color:#22c55e;background:#f0fdf4;color:#16a34a}
.filter-pref-btn.nonveg-active{border-color:#ef4444;background:#fef2f2;color:#dc2626}
.price-range{width:100%;accent-color:var(--primary)}
.range-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:4px}
.menu-main{flex:1;min-width:0}
.search-bar{position:relative;margin-bottom:20px}
.search-input{width:100%;padding:12px 16px 12px 44px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--fg);font-size:.92rem;transition:var(--t)}
.search-input:focus{outline:none;border-color:var(--primary)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--muted)}
.results-count{font-size:.85rem;color:var(--muted);margin-bottom:16px}
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.empty-state{text-align:center;padding:60px 20px;grid-column:1/-1}
.big-emoji{font-size:3rem;margin-bottom:12px}

/* ===== CHECKOUT ===== */
.checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;padding:32px 0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--fg);font-size:.9rem;transition:var(--t)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary)}
.form-textarea{resize:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pincode-row,.coupon-row{display:flex;gap:8px}
.pincode-row .form-input,.coupon-row .form-input{flex:1}
.pincode-msg,.coupon-msg{font-size:.8rem;font-weight:600;margin-top:4px}
.ok{color:#22c55e}
.err{color:#ef4444}
.payment-options{display:flex;flex-direction:column;gap:8px}
.payment-option{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--t)}
.payment-option.selected{border-color:var(--primary);background:var(--primary-light)}
.payment-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--t)}
.payment-option.selected .payment-radio{border-color:var(--primary)}

.status-confirmed{background:#dbeafe;color:#1d4ed8}
.status-preparing{background:#ffedd5;color:#c2410c}
.status-picked_up{background:#ede9fe;color:#7c3aed}
.status-delivered{background:#dcfce7;color:#15803d}
.status-cancelled{background:#fee2e2;color:#dc2626}
.order-items-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.order-item-chip{font-size:.78rem;background:var(--bg3);padding:4px 10px;border-radius:20px}
.order-footer{display:flex;align-items:center;justify-content:space-between}
.order-total{font-weight:800;color:var(--primary);font-size:1rem}

.step-icon{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;z-index:1;transition:var(--t)}

.step-content{padding:8px 0 28px}
.step-label{font-weight:600;font-size:.9rem}
.step-desc{font-size:.8rem;color:var(--muted);margin-top:2px}

.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:var(--radius)}

function updateCartUI(){
  const count=cartCount();
  const badge=$('#cartBadge');if(badge){badge.textContent=count>9?'9+':count;badge.classList.toggle('hidden',count===0);}
  const lbl=$('#cartCountLabel');if(lbl)lbl.textContent=count;
  renderCartDrawer();
}
function renderCartDrawer(){
  const ci=$('#cartItems'),cf=$('#cartFooter');if(!ci)return;
  if(!cart.length){
    ci.innerHTML=`<div class="cart-empty"><div class="empty-icon">🛒</div><p class="fw-bold">Cart is empty</p><p class="text-muted sm">Add something delicious</p><br><button class="btn btn-primary" onclick="closeCart();navigate('menu')">Browse Menu</button></div>`;
    cf&&cf.classList.add('hidden');return;
  }
  cf&&cf.classList.remove('hidden');
  ci.innerHTML=cart.map(i=>`
    <div class="cart-item">
      <img src="${i.imageUrl}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200'" />
      <div class="cart-item-info">
        <div class="cart-item-name">${i.name}</div>
        ${i.spiceLevel?`<div class="cart-item-meta">${i.spiceLevel}</div>`:''}
        <div class="cart-item-price">${fp(i.price*i.quantity)}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="cartQty('${i.cartItemId}',-1)">−</button>
          <span class="qty-num">${i.quantity}</span>
          <button class="qty-btn plus" onclick="cartQty('${i.cartItemId}',1)">+</button>
        </div>
      </div>
      <span class="cart-item-del" onclick="cartRemove('${i.cartItemId}')">🗑️</span>
    </div>`).join('');
  const sub=cartTotal(),tax=sub*.05,total=sub+40+tax;
  ['cfSubtotal','cfTax','cfTotal'].forEach((id,idx)=>{const el=$(('#'+id));if(el)el.textContent=fp([sub,tax,total][idx]);});
}
function cartQty(id,d){const i=cart.find(x=>x.cartItemId===id);if(!i)return;i.quantity+=d;if(i.quantity<=0)cart=cart.filter(x=>x.cartItemId!==id);saveCart();}
function cartRemove(id){cart=cart.filter(x=>x.cartItemId!==id);saveCart();}
function addToCart(item){
  const ex=cart.find(i=>i.menuItemId===item.menuItemId&&i.spiceLevel===item.spiceLevel&&i.portionSize===item.portionSize&&JSON.stringify(i.addOns||[])===JSON.stringify(item.addOns||[]));
  if(ex){ex.quantity+=item.quantity;}else{cart.push({...item,cartItemId:Math.random().toString(36).slice(2,11)});}
  saveCart();openCart();showToast(`Added ${item.name} 🎉`);
}
function openCart(){$('#cartOverlay').classList.remove('hidden');$('#cartDrawer').classList.add('open');}
function closeCart(){$('#cartOverlay').classList.add('hidden');$('#cartDrawer').classList.remove('open');}
$('#cartBtn').onclick=openCart;

// ===== CUSTOMIZE MODAL =====
function openCustomize(item){
  customizeItem=item;
  customizeState={spiceLevel:item.spiceLevels?.[0]||'',portionSize:item.portionSizes?.[0]?.label||'',addOns:[],qty:1};
  renderCustomize();$('#customizeOverlay').classList.remove('hidden');
}
function closeCustomize(){$('#customizeOverlay').classList.add('hidden');}
$('#customizeOverlay').onclick=e=>{if(e.target===$('#customizeOverlay'))closeCustomize();};
function renderCustomize(){
  const item=customizeItem;if(!item)return;
  const pm=item.portionSizes?.find(p=>p.label===customizeState.portionSize)?.priceMultiplier||1;
  const addonTotal=customizeState.addOns.reduce((s,n)=>{const a=item.addOns?.find(x=>x.name===n);return s+(a?.price||0);},0);
  const total=(item.price*pm+addonTotal)*customizeState.qty;
  $('#customizeContent').innerHTML=`
    <h3 class="customize-name">${item.name}</h3>
    <p class="customize-price">${fp(item.price)}</p>
    ${item.spiceLevels?.length?`<div class="option-group"><div class="option-group-label">🌶️ Spice Level</div><div class="option-pills">${item.spiceLevels.map(l=>`<div class="option-pill ${customizeState.spiceLevel===l?'selected':''}" onclick="cSelect('spice','${l}')">${l}</div>`).join('')}</div></div>`:''}
    ${item.portionSizes?.length>1?`<div class="option-group"><div class="option-group-label">🍽️ Portion Size</div><div class="option-pills">${item.portionSizes.map(p=>`<div class="option-pill ${customizeState.portionSize===p.label?'selected':''}" onclick="cSelect('portion','${p.label}')">${p.label} — ${fp(item.price*p.priceMultiplier)}</div>`).join('')}</div></div>`:''}
    ${item.addOns?.length?`<div class="option-group"><div class="option-group-label">➕ Add-ons</div>${item.addOns.map(a=>`<div class="addon-option ${customizeState.addOns.includes(a.name)?'selected':''}" onclick="cToggleAddon('${a.name}')"><div class="addon-left"><div class="checkbox">${customizeState.addOns.includes(a.name)?'✓':''}</div><span>${a.name}</span></div><span class="text-primary fw-bold">+${fp(a.price)}</span></div>`).join('')}</div>`:''}
    <div class="qty-row">
      <div class="qty-controls">
        <button class="qty-btn" onclick="cQty(-1)">−</button>
        <span class="qty-num">${customizeState.qty}</span>
        <button class="qty-btn plus" onclick="cQty(1)">+</button>
      </div>
      <button class="modal-add-btn" onclick="cAdd()">Add to Cart — ${fp(total)}</button>
    </div>`;
}
function cSelect(type,val){if(type==='spice')customizeState.spiceLevel=val;else customizeState.portionSize=val;renderCustomize();}
function cToggleAddon(name){customizeState.addOns.includes(name)?customizeState.addOns=customizeState.addOns.filter(a=>a!==name):customizeState.addOns.push(name);renderCustomize();}
function cQty(d){customizeState.qty=Math.max(1,customizeState.qty+d);renderCustomize();}
function cAdd(){
  const item=customizeItem;
  const pm=item.portionSizes?.find(p=>p.label===customizeState.portionSize)?.priceMultiplier||1;
  const addonTotal=customizeState.addOns.reduce((s,n)=>{const a=item.addOns?.find(x=>x.name===n);return s+(a?.price||0);},0);
  addToCart({menuItemId:item.id,name:item.name,price:item.price*pm+addonTotal,quantity:customizeState.qty,imageUrl:item.imageUrl,spiceLevel:customizeState.spiceLevel||undefined,portionSize:customizeState.portionSize||undefined,addOns:customizeState.addOns.length?customizeState.addOns:undefined});
  closeCustomize();
}

// ===== ROUTER =====
function navigate(page,params={}){
  currentPage=page;
  $$('[data-page]').forEach(l=>l.classList.toggle('active',l.dataset.page===page));
  const routes={home:renderHome,menu:renderMenu,cart:renderCart,orders:renderOrders,account:renderAccount,admin:renderAdmin,adminmenu:renderAdminMenu,track:renderTrack};
  (routes[page]||renderHome)(params);
  window.scrollTo(0,0);
}

function itemCardHtml(item){
  return `<div class="item-card">

      <div class="item-desc">${item.description}</div>
      <div class="item-meta"><span style="color:#f59e0b">★</span><strong>${item.rating.toFixed(1)}</strong><span>(${item.reviewCount})</span><span>·</span><span>${item.brand}</span></div>
      <div class="item-footer">
        <div class="item-price">${fp(item.price)}</div>
        <button class="add-btn" onclick="handleAdd(${item.id})">+ Add</button>
      </div>

  </div>`;
}
function handleAdd(id){
  const item=MENU_ITEMS.find(i=>i.id===id);if(!item)return;
  const needs=(item.spiceLevels?.length>0)||(item.portionSizes?.length>1)||(item.addOns?.length>0);
  if(needs)openCustomize(item);
  else addToCart({menuItemId:item.id,name:item.name,price:item.price,quantity:1,imageUrl:item.imageUrl});
}

function updateMenuResults(){

  if(menuFilters.maxPrice)items=items.filter(i=>i.price<=menuFilters.maxPrice);
  if(menuFilters.search)items=items.filter(i=>i.name.toLowerCase().includes(menuFilters.search.toLowerCase())||i.description.toLowerCase().includes(menuFilters.search.toLowerCase()));
  const el=$('#menuResults');if(!el)return;
  el.innerHTML=`<div class="results-count">${items.length} items found</div><div class="items-grid">${items.length?items.map(itemCardHtml).join(''):'<div class="empty-state"><div class="big-emoji">🔍</div><p class="fw-bold">No items found</p><p class="text-muted">Try adjusting your filters</p><br><button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button></div>'}</div>`;

function applyCoupon(){
  const code=($('#couponInput')?.value||'').trim().toUpperCase();
  checkoutState.coupon=code;
  const c=COUPONS[code];
  const msg=$('#couponMsg');
  if(c&&cartTotal()>=c.minOrder){checkoutState.discount=c.discount;if(msg){msg.textContent=`✅ ${c.description} applied!`;msg.className='coupon-msg ok';}}
  else{checkoutState.discount=0;if(msg){msg.textContent=code?'❌ Invalid or not applicable coupon':'';msg.className='coupon-msg err';}}
  navigate('cart');
}
function checkPin(){
  const pin=($('#pincodeInput')?.value||'').trim();checkoutState.pincode=pin;
  const ok=['400001','400002','400019','400053','400058','400069','400072'].includes(pin);
  checkoutState.pincodeOk=ok;
  const msg=$('#pinMsg');if(msg){msg.textContent=ok?'✅ Delivery available!':'❌ We don\'t deliver to this pincode yet';msg.className='pincode-msg '+(ok?'ok':'err');}
}
function selectPayment(m){checkoutState.payment=m;navigate('cart');}
function placeOrder(){
  checkoutState.address=($('#addrInput')?.value||'').trim();
  if(!checkoutState.address||!checkoutState.pincodeOk){showToast('Add delivery address and verify pincode');return;}
  const sub=cartTotal(),tax=sub*.05,total=sub+40+tax-checkoutState.discount;
  const order={id:Date.now(),items:[...cart],status:'confirmed',subtotal:sub,deliveryFee:40,tax,total,discount:checkoutState.discount,deliveryAddress:`${checkoutState.address}, ${checkoutState.pincode}`,paymentMethod:checkoutState.payment,createdAt:new Date().toISOString()};
  orders.push(order);saveOrders();
  cart=[];saveCart();
  checkoutState={address:'',pincode:'',pincodeOk:false,coupon:'',discount:0,payment:'cod'};
  showToast('Order placed successfully! 🎉');
  navigate('track',{id:order.id});
}

// ===== ORDERS PAGE =====
function statusLabel(s){return{pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',picked_up:'Out for Delivery',delivered:'Delivered',cancelled:'Cancelled'}[s]||s;}
function renderOrders(){
  $('#app').innerHTML=`
    <div class="page-header"><div class="container"><h1>My Orders</h1><p>Track and reorder your past meals</p></div></div>
    <div class="container" style="padding:32px 20px;max-width:700px">
      ${!orders.length?`<div class="empty-state"><div class="big-emoji">📦</div><p class="fw-bold">No orders yet</p><p class="text-muted">Your orders will appear here</p><button class="btn btn-primary mt-2" onclick="navigate('menu')">Order Now</button></div>`
      :[...orders].reverse().map(o=>`<div class="order-card">
        <div class="order-header">
          <div><div class="order-id">Order #${String(o.id).slice(-6)}</div><div class="order-date">${new Date(o.createdAt).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div>
          <div class="status-badge status-${o.status}">${statusLabel(o.status)}</div>
        </div>
        <div class="order-items-list">${o.items.map(i=>`<span class="order-item-chip">${i.name} ×${i.quantity}</span>`).join('')}</div>
        <div class="order-footer">
          <div class="order-total">${fp(o.total)}</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="reorder(${o.id})">↺ Reorder</button>
            ${o.status!=='delivered'&&o.status!=='cancelled'?`<button class="btn btn-primary btn-sm" onclick="navigate('track',{id:${o.id}})">Track →</button>`:''}
          </div>
        </div>
      </div>`).join('')}
    </div>
    ${renderFooter()}`;
}
function reorder(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  o.items.forEach(i=>addToCart({menuItemId:i.menuItemId,name:i.name,price:i.price,quantity:i.quantity,imageUrl:i.imageUrl||'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200'}));
}

// ===== TRACK PAGE =====
const trackSteps=[
  {key:'confirmed',icon:'✅',label:'Order Confirmed',desc:'We have received your order'},
  {key:'preparing',icon:'👨‍🍳',label:'Preparing',desc:'Our chefs are cooking your food'},
  {key:'picked_up',icon:'🛵',label:'Out for Delivery',desc:'Your order is on the way'},
  {key:'delivered',icon:'🏠',label:'Delivered',desc:'Enjoy your meal!'},
];
const statusOrder=['confirmed','preparing','picked_up','delivered'];
function renderTrack(params={}){
  const o=orders.find(x=>x.id===params.id);
  if(!o){$('#app').innerHTML=`<div style="text-align:center;padding:80px 20px"><p style="font-size:3rem">📦</p><h2 class="fw-black">Order not found</h2><button class="btn btn-primary mt-4" onclick="navigate('orders')">My Orders</button></div>`;return;}
  const stepIdx=statusOrder.indexOf(o.status);
  $('#app').innerHTML=`
    <div class="page-header"><div class="container"><h1>Track Order</h1><p>Order #${String(o.id).slice(-6)}</p></div></div>
    <div class="container" style="padding:32px 20px;max-width:700px">
      <div class="track-banner">
        <div style="display:flex;justify-content:space-between">
          <div><div style="font-size:.85rem;opacity:.8">Current Status</div><div class="track-status-val">${statusLabel(o.status)}</div></div>
          <div style="text-align:right"><div style="font-size:.85rem;opacity:.8">Estimated</div><div style="font-weight:600">30-45 min</div></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <h3 style="font-weight:700;margin-bottom:20px">Order Progress</h3>
        <div class="stepper">
          ${trackSteps.map((step,i)=>`<div class="step ${i<=stepIdx?'done':''}">
            <div class="step-line"></div>
            <div class="step-icon">${step.icon}</div>
            <div class="step-content"><div class="step-label" style="${i<=stepIdx?'color:var(--primary)':''}">${step.label}</div><div class="step-desc">${step.desc}</div></div>
          </div>`).join('')}
        </div>
        ${o.status!=='delivered'?`<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">${statusOrder.slice(statusOrder.indexOf(o.status)+1).map(s=>`<button class="btn btn-outline btn-sm" onclick="advanceOrder(${o.id},'${s}')">Mark as ${statusLabel(s)}</button>`).join('')}</div>`:''}
      </div>
      <div class="card">
        <h3 style="font-weight:700;margin-bottom:12px">Order Details</h3>
        ${o.items.map(i=>`<div class="price-row"><span class="text-muted">${i.name} ×${i.quantity}</span><span>${fp(i.price*i.quantity)}</span></div>`).join('')}
        <div class="divider"></div>
        <div class="price-row"><span class="text-muted">Subtotal</span><span>${fp(o.subtotal)}</span></div>
        <div class="price-row"><span class="text-muted">Delivery</span><span>₹40</span></div>
        <div class="price-row"><span class="text-muted">Tax</span><span>${fp(o.tax)}</span></div>
        ${o.discount>0?`<div class="price-row" style="color:#22c55e"><span>Discount</span><span>-${fp(o.discount)}</span></div>`:''}
        <div class="divider"></div>
        <div class="price-row" style="font-weight:900;font-size:1rem"><span>Total</span><span class="text-primary">${fp(o.total)}</span></div>
        <div class="divider"></div>
        <div class="text-muted sm">📍 ${o.deliveryAddress}</div>
        <div class="text-muted sm">💳 ${o.paymentMethod==='cod'?'Cash on Delivery':'Online Payment'}</div>
      </div>
    </div>
    ${renderFooter()}`;
}
function advanceOrder(id,status){
  const o=orders.find(x=>x.id===id);if(!o)return;
  o.status=status;saveOrders();renderTrack({id});showToast(`Status: ${statusLabel(status)}`);
}

function loginUser(){
  const phone=($('#phoneInput')?.value||'').trim();
  if(!phone){showToast('Enter your mobile number');return;}
  userId=phone;
  userProfile={phone,name:($('#nameInput')?.value||'').trim()||undefined,email:($('#emailInput')?.value||'').trim()||undefined,referralCode:'SB'+phone.slice(-6)};
  localStorage.setItem('spicebox_user',userId);
  localStorage.setItem('spicebox_profile',JSON.stringify(userProfile));
  showToast('Signed in! 🎉');navigate('account');
}
function logoutUser(){userId=null;userProfile=null;localStorage.removeItem('spicebox_user');localStorage.removeItem('spicebox_profile');navigate('account');}

function renderAdmin(){
  const totalRev=orders.reduce((s,o)=>s+o.total,0);
  const today=new Date().toDateString();
  const todayOrders=orders.filter(o=>new Date(o.createdAt).toDateString()===today).length;
  const revenueByDay=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const label=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];const ds=d.toDateString();const rev=orders.filter(o=>new Date(o.createdAt).toDateString()===ds).reduce((s,o)=>s+o.total,0);revenueByDay.push({label,revenue:rev});}
  const maxRev=Math.max(...revenueByDay.map(d=>d.revenue),1);
  $('#app').innerHTML=`
    <div class="admin-layout">
      ${adminSidebar('dashboard')}
      <div class="admin-main">
        <div class="admin-header"><h1 style="font-size:1.3rem;font-weight:900">Dashboard</h1><button class="btn btn-ghost btn-sm" onclick="navigate('home')">← Back to site</button></div>
        <div class="stat-cards">
          ${[{l:'Total Orders',v:orders.length,i:'🛍️',bg:'#dbeafe',c:'#1d4ed8'},{l:"Today's Orders",v:todayOrders,i:'⚡',bg:'#fef3c7',c:'#d97706'},{l:'Total Revenue',v:'₹'+totalRev.toFixed(0),i:'📈',bg:'#dcfce7',c:'#15803d'},{l:'Customers',v:userId?1:0,i:'👥',bg:'#ede9fe',c:'#7c3aed'}]
          .map(c=>`<div class="stat-card"><div class="stat-icon" style="background:${c.bg};color:${c.c}">${c.i}</div><div class="stat-val">${c.v}</div><div class="stat-label">${c.l}</div></div>`).join('')}
        </div>
        <div class="chart-card">
          <div class="chart-header"><div class="chart-title">Revenue — Last 7 Days</div></div>
          <div class="chart-wrap">
            ${revenueByDay.map(d=>`<div class="bar-col"><div class="bar" style="height:${Math.max(4,(d.revenue/maxRev)*160)}px" data-val="₹${d.revenue.toFixed(0)}"></div><div class="bar-label">${d.label}</div></div>`).join('')}
          </div>
        </div>
        <div class="orders-table">
          <div class="table-header">Live Orders</div>
          <table class="data-table">
            <thead><tr><th>Order</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>
              ${!orders.length?'<tr><td colspan="4" class="text-muted" style="text-align:center;padding:24px">No orders yet</td></tr>'
              :[...orders].reverse().slice(0,15).map(o=>`<tr>
                <td>#${String(o.id).slice(-6)}</td>
                <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)">${o.items.map(i=>`${i.name} ×${i.quantity}`).join(', ')}</td>
                <td style="font-weight:700;color:var(--primary)">${fp(o.total)}</td>
                <td><select class="status-select" onchange="updateOrderStatus(${o.id},this.value)">${['confirmed','preparing','picked_up','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${statusLabel(s)}</option>`).join('')}</select></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
